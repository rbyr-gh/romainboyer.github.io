<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Modèle OBJ sans MTL</title>
  <style>
    body { margin:0; overflow:hidden; }
    canvas { display:block; }
  </style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/OBJLoader.js"></script>

<script>
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // Lumière
  const light = new THREE.DirectionalLight(0xffffff, 1);
  light.position.set(1,1,1);
  scene.add(light);
  scene.add(new THREE.AmbientLight(0xffffff, 0.5));

  // Charger le OBJ
  const objLoader = new THREE.OBJLoader();
  objLoader.load('monmodele.obj', function(object){
    // Appliquer un matériau simple à tous les enfants
    object.traverse(function(child){
      if (child.isMesh){
        child.material = new THREE.MeshNormalMaterial(); // couleur automatique
      }
    });
    scene.add(object);
    object.position.y = -1;
  });

  camera.position.z = 5;

  function animate(){
    requestAnimationFrame(animate);
    scene.rotation.y += 0.01; // rotation automatique
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', ()=>{
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>

</body>
</html>
